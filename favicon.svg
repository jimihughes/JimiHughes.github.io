<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <style>
      @keyframes pulse {
        0%, 100% { fill: #111111; }
        50%       { fill: #4338ca; }
      }
      @keyframes glow {
        0%, 100% { opacity: 0; }
        50%       { opacity: 1; }
      }
      .bg   { animation: pulse 3s ease-in-out infinite; }
      .ring { animation: glow  3s ease-in-out infinite; }
    </style>
  </defs>
  <!-- Pulsing background -->
  <rect class="bg" width="32" height="32" rx="8" fill="#111"/>
  <!-- Soft glow ring that syncs with the pulse -->
  <rect class="ring" x="1" y="1" width="30" height="30" rx="7.5"
        fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0"/>
  <!-- J lettermark -->
  <text x="16" y="23"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="18" font-weight="800" fill="white"
        text-anchor="middle" letter-spacing="-0.5">J</text>
</svg>
