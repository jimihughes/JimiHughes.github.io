<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Pulsing background using SMIL (works in browser favicons) -->
  <rect width="32" height="32" rx="8" fill="#111">
    <animate attributeName="fill"
      values="#111111;#4338ca;#111111"
      dur="3s"
      repeatCount="indefinite"/>
  </rect>
  <!-- Glow ring synced to pulse -->
  <rect x="1" y="1" width="30" height="30" rx="7.5"
        fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0">
    <animate attributeName="opacity"
      values="0;1;0"
      dur="3s"
      repeatCount="indefinite"/>
  </rect>
  <!-- J lettermark -->
  <text x="16" y="23"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="18" font-weight="800" fill="white"
        text-anchor="middle" letter-spacing="-0.5">J</text>
</svg>
